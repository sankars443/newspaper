<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupplyCalc - Newspaper Billing</title>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Core Libraries) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel (Compiles React JSX directly in the browser so it doesn't show as text) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICON COMPONENTS (Replaces external imports for standard standalone HTML) ---
        const Settings = ({size=24, className=""}) => (<svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>);
        const Calculator = ({size=24, className=""}) => (<svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>);
        const Plus = ({size=24, className=""}) => (<svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>);
        const Trash2 = ({size=24, className=""}) => (<svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>);
        const Save = ({size=24, className=""}) => (<svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>);
        const FileText = ({size=24, className=""}) => (<svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>);
        const IndianRupee = ({size=24, className=""}) => (<svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 3h12"></path><path d="M6 8h12"></path><path d="M6 13h8.5a4.5 4.5 0 0 0 0-9"></path><path d="M11 13l5 8"></path></svg>);

        // Predefined Lists based on requirements
        const NEWSPAPERS = ["MATHRUBHUMI", "MALAYALA MANORAMA", "HINDHU"];
        const SUPPLEMENTS = ["VANITHA", "GRIHALAKSHMI", "JYOTHISHA RATHNAM", "KARSHAKASREE", "ARODGYA MASIKA"];

        // Initial Default Prices
        const initialPrices = {
          "MATHRUBHUMI": 8,
          "MALAYALA MANORAMA": 8,
          "HINDHU": 10,
          "VANITHA": 40,
          "GRIHALAKSHMI": 40,
          "JYOTHISHA RATHNAM": 30,
          "KARSHAKASREE": 35,
          "ARODGYA MASIKA": 30
        };

        function App() {
          const [activeTab, setActiveTab] = useState('billing');
          
          // Admin State (Prices)
          const [prices, setPrices] = useState(initialPrices);
          const [tempPrices, setTempPrices] = useState(initialPrices);
          const [showSaveAlert, setShowSaveAlert] = useState(false);

          // Billing State
          const [billItems, setBillItems] = useState([]);
          const [selectedItem, setSelectedItem] = useState('');
          const [itemQty, setItemQty] = useState(1);
          const [pendingAmount, setPendingAmount] = useState(0);

          // --- ADMIN FUNCTIONS ---
          const handlePriceChange = (item, value) => {
            setTempPrices(prev => ({ ...prev, [item]: Number(value) }));
          };

          const savePrices = () => {
            setPrices(tempPrices); // Permanently save to main state
            setShowSaveAlert(true);
            setTimeout(() => setShowSaveAlert(false), 3000);
          };

          // --- BILLING FUNCTIONS ---
          const addToBill = () => {
            if (!selectedItem) return;
            
            const existingItemIndex = billItems.findIndex(item => item.name === selectedItem);
            
            if (existingItemIndex >= 0) {
              const updatedBill = [...billItems];
              updatedBill[existingItemIndex].qty += Number(itemQty);
              setBillItems(updatedBill);
            } else {
              setBillItems([...billItems, { name: selectedItem, qty: Number(itemQty) }]);
            }
            
            setSelectedItem('');
            setItemQty(1);
          };

          const removeFromBill = (indexToRemove) => {
            setBillItems(billItems.filter((_, index) => index !== indexToRemove));
          };

          const calculateSubtotal = () => {
            return billItems.reduce((total, item) => {
              const itemPrice = prices[item.name] || 0;
              return total + (itemPrice * item.qty);
            }, 0);
          };

          const subtotal = calculateSubtotal();
          const grandTotal = subtotal + Number(pendingAmount || 0);

          // --- VIEWS ---
          const renderAdmin = () => (
            <div className="max-w-4xl mx-auto space-y-6">
              <div className="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div>
                  <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                    <Settings className="mr-2 text-blue-600" /> Admin Pricing Panel
                  </h2>
                  <p className="text-gray-500 text-sm mt-1">Set the unit prices for all newspapers and supplements here. The billing portal will use these saved prices automatically.</p>
                </div>
                <button 
                  onClick={savePrices}
                  className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium shadow-md transition-colors flex items-center"
                >
                  <Save size={20} className="mr-2" /> Save Prices
                </button>
              </div>

              {showSaveAlert && (
                <div className="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-xl flex items-center">
                  <FileText className="mr-2" size={20} />
                  Prices saved permanently! The billing portal is now updated.
                </div>
              )}

              <div className="grid md:grid-cols-2 gap-6">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                  <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Newspapers</h3>
                  <div className="space-y-4">
                    {NEWSPAPERS.map(paper => (
                      <div key={paper} className="flex justify-between items-center">
                        <label className="text-gray-700 font-medium w-1/2">{paper}</label>
                        <div className="relative w-1/2">
                          <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <IndianRupee size={16} className="text-gray-400" />
                          </div>
                          <input 
                            type="number" 
                            className="pl-9 w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                            value={tempPrices[paper] || ''}
                            onChange={(e) => handlePriceChange(paper, e.target.value)}
                          />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                  <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Supplements</h3>
                  <div className="space-y-4">
                    {SUPPLEMENTS.map(sup => (
                      <div key={sup} className="flex justify-between items-center">
                        <label className="text-gray-700 font-medium w-1/2">{sup}</label>
                        <div className="relative w-1/2">
                          <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <IndianRupee size={16} className="text-gray-400" />
                          </div>
                          <input 
                            type="number" 
                            className="pl-9 w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                            value={tempPrices[sup] || ''}
                            onChange={(e) => handlePriceChange(sup, e.target.value)}
                          />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          );

          const renderBilling = () => (
            <div className="max-w-5xl mx-auto grid md:grid-cols-2 gap-8">
              <div className="space-y-6">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                  <h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <Calculator className="mr-2 text-blue-600" /> Billing Calculator
                  </h2>

                  <div className="space-y-5">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Select Publication</label>
                      <select 
                        className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50"
                        value={selectedItem}
                        onChange={(e) => setSelectedItem(e.target.value)}
                      >
                        <option value="">-- Select Newspaper or Supplement --</option>
                        <optgroup label="Newspapers">
                          {NEWSPAPERS.map(paper => (
                            <option key={paper} value={paper}>{paper} (₹{prices[paper]}/unit)</option>
                          ))}
                        </optgroup>
                        <optgroup label="Supplements">
                          {SUPPLEMENTS.map(sup => (
                            <option key={sup} value={sup}>{sup} (₹{prices[sup]}/unit)</option>
                          ))}
                        </optgroup>
                      </select>
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Quantity / Days</label>
                      <input 
                        type="number" 
                        min="1"
                        className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50"
                        value={itemQty}
                        onChange={(e) => setItemQty(e.target.value)}
                        placeholder="E.g., 30 for daily newspaper, 1 for monthly supplement"
                      />
                    </div>

                    <button 
                      onClick={addToBill}
                      disabled={!selectedItem}
                      className={`w-full py-3 rounded-xl font-bold text-white shadow-md transition-colors flex justify-center items-center ${selectedItem ? 'bg-blue-600 hover:bg-blue-700' : 'bg-blue-300 cursor-not-allowed'}`}
                    >
                      <Plus size={20} className="mr-2" /> Add to Bill
                    </button>
                  </div>
                </div>

                <div className="bg-orange-50 p-6 rounded-2xl shadow-sm border border-orange-100">
                  <h3 className="text-lg font-bold text-orange-800 mb-3">Pending Amount / Arrears</h3>
                  <p className="text-sm text-orange-600 mb-4">Enter any unpaid amount from previous months. This will be automatically added to the grand total.</p>
                  <div className="relative">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                      <IndianRupee size={20} className="text-orange-500" />
                    </div>
                    <input 
                      type="number" 
                      className="pl-11 w-full p-4 text-lg font-bold text-orange-900 border border-orange-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none bg-white shadow-inner"
                      value={pendingAmount || ''}
                      onChange={(e) => setPendingAmount(e.target.value)}
                      placeholder="0"
                    />
                  </div>
                </div>
              </div>

              <div className="bg-gray-800 p-1 rounded-3xl shadow-2xl h-fit sticky top-24">
                <div className="bg-white rounded-[22px] p-6 min-h-[400px] flex flex-col">
                  <div className="text-center mb-6 border-b border-gray-200 pb-4 border-dashed">
                    <h3 className="text-xl font-black text-gray-800 uppercase tracking-widest">Invoice</h3>
                    <p className="text-gray-400 text-sm mt-1">Generated Automatically</p>
                  </div>

                  <div className="flex-1 space-y-4">
                    {billItems.length === 0 ? (
                      <div className="h-full flex flex-col items-center justify-center text-gray-400 pt-10">
                        <FileText size={48} className="mb-4 opacity-20" />
                        <p>No items added yet.</p>
                      </div>
                    ) : (
                      billItems.map((item, index) => {
                        const itemPrice = prices[item.name];
                        const itemTotal = itemPrice * item.qty;
                        return (
                          <div key={index} className="flex justify-between items-center group">
                            <div className="flex-1">
                              <p className="font-bold text-gray-800">{item.name}</p>
                              <p className="text-sm text-gray-500">₹{itemPrice} × {item.qty} Qty</p>
                            </div>
                            <div className="flex items-center space-x-4">
                              <p className="font-bold text-gray-800">₹{itemTotal}</p>
                              <button 
                                onClick={() => removeFromBill(index)}
                                className="text-red-400 hover:text-red-600 p-1 bg-red-50 rounded-md opacity-0 hover:opacity-100 transition-opacity"
                              >
                                <Trash2 size={16} />
                              </button>
                            </div>
                          </div>
                        );
                      })
                    )}
                  </div>

                  <div className="mt-8 pt-4 border-t border-gray-200 border-dashed space-y-3">
                    <div className="flex justify-between items-center text-gray-600">
                      <p>Current Month Subtotal</p>
                      <p className="font-bold">₹{subtotal}</p>
                    </div>
                    {Number(pendingAmount) > 0 && (
                      <div className="flex justify-between items-center text-orange-600">
                        <p>Pending Arrears</p>
                        <p className="font-bold">+ ₹{Number(pendingAmount)}</p>
                      </div>
                    )}
                    
                    <div className="flex justify-between items-center bg-green-50 p-4 rounded-xl mt-4 border border-green-100">
                      <p className="text-lg font-black text-green-800">GRAND TOTAL</p>
                      <p className="text-2xl font-black text-green-700 flex items-center">
                        <IndianRupee size={24} className="mr-1" /> {grandTotal}
                      </p>
                    </div>
                    
                    {billItems.length > 0 && (
                      <button 
                        onClick={() => {
                          setBillItems([]);
                          setPendingAmount(0);
                          alert('Bill Cleared / Saved successfully!');
                        }}
                        className="w-full mt-4 bg-gray-100 hover:bg-gray-200 text-gray-700 py-3 rounded-xl font-bold transition-colors"
                      >
                        Clear Receipt
                      </button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );

          return (
            <div className="pb-10">
              <header className="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-10 mb-8">
                <div className="max-w-5xl mx-auto px-4 h-16 flex justify-between items-center">
                  <div className="flex items-center space-x-2">
                    <div className="bg-blue-600 p-2 rounded-lg text-white">
                      <FileText size={20} />
                    </div>
                    <h1 className="text-xl font-bold text-gray-800">SupplyCalc</h1>
                  </div>
                  
                  <nav className="flex space-x-2 bg-gray-100 p-1 rounded-xl">
                    <button 
                      onClick={() => setActiveTab('billing')}
                      className={`px-5 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === 'billing' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                    >
                      Billing Module
                    </button>
                    <button 
                      onClick={() => setActiveTab('admin')}
                      className={`px-5 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === 'admin' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                    >
                      Admin Module
                    </button>
                  </nav>
                </div>
              </header>

              <main className="px-4">
                {activeTab === 'admin' ? renderAdmin() : renderBilling()}
              </main>
            </div>
          );
        }

        // Render the app to the root div
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
